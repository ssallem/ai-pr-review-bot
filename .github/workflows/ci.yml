name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 같은 branch의 이전 실행 자동 취소 (비용 절감)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check pr_reviewer pr_describer tests

      - name: Run pytest with coverage
        env:
          # conftest.py가 더미값을 주입하지만 환경에서도 명시
          ANTHROPIC_API_KEY: sk-ant-test-dummy
        run: |
          pytest tests/ -v --cov=pr_reviewer --cov=pr_describer --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
